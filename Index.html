<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Ciudad Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden md:max-w-2xl p-6">
        <h1 class="text-2xl font-bold text-green-600 mb-4 text-center">Dashboard: Lavadora</h1>
        
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-blue-50 p-4 rounded-lg">
                <p class="text-sm text-gray-500">Horas de uso</p>
                <p class="text-xl font-bold">2 horas/día</p>
            </div>
            <div class="bg-yellow-50 p-4 rounded-lg">
                <p class="text-sm text-gray-500">Consumo</p>
                <p class="text-xl font-bold">0.8 kWh</p>
            </div>
            <div class="bg-red-50 p-4 rounded-lg col-span-2">
                <p class="text-sm text-gray-500">Costo estimado</p>
                <p class="text-xl font-bold text-red-600">$0.16 USD</p>
            </div>
        </div>

        <div class="mt-6 border-t pt-4">
            <h2 class="font-semibold text-gray-700">Cómo reducir el consumo:</h2>
            <p class="text-gray-600 mt-2">
                - Lava siempre con carga completa.
                - Utiliza ciclos de agua fría para evitar el gasto energético del calentador.
            </p>
        </div>
    </div>
</body>
</html>
